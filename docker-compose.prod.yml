# Production stack for DigitalOcean Droplet (or any VPS).
# Usage: cp deploy/.env.prod.example .env.prod && edit secrets, then:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sentrix-backend
    environment:
      APP_NAME: SENTRIX
      DATA_SOURCE: ${DATA_SOURCE:-mock}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.prod}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-480}
      CORS_ORIGINS: ${PUBLIC_URL:-http://localhost}
      PHANTOMX_DB_PATH: /app/data/phantomx.db
      AI_PROVIDER: ${AI_PROVIDER:-local_mock}
    volumes:
      - sentrix_data:/app/data
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        # Empty = browser calls /api/v1 on the same host (nginx proxies to backend)
        VITE_API_BASE: ""
    container_name: sentrix-frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Optional HTTPS — set DOMAIN in .env.prod (e.g. sentrix.yourdomain.com)
  caddy:
    image: caddy:2-alpine
    container_name: sentrix-caddy
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  sentrix_data:
  caddy_data:
  caddy_config:
